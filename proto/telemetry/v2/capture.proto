syntax = "proto3";

package telemetry.v2;

option csharp_namespace = "Nevr.Telemetry.V2";

import "google/protobuf/timestamp.proto";
import "telemetry/v2/echo_arena.proto";

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_ROUND_STARTED = 1;
  EVENT_TYPE_ROUND_PAUSED = 2;
  EVENT_TYPE_ROUND_UNPAUSED = 3;
  EVENT_TYPE_ROUND_ENDED = 4;
  EVENT_TYPE_MATCH_ENDED = 5;
  EVENT_TYPE_SCOREBOARD_UPDATED = 6;
  EVENT_TYPE_PLAYER_JOINED = 10;
  EVENT_TYPE_PLAYER_LEFT = 11;
  EVENT_TYPE_PLAYER_SWITCHED_TEAM = 12;
  EVENT_TYPE_EMOTE_PLAYED = 13;
  EVENT_TYPE_DISC_POSSESSION_CHANGED = 20;
  EVENT_TYPE_DISC_THROWN = 21;
  EVENT_TYPE_DISC_CAUGHT = 22;
  EVENT_TYPE_GOAL_SCORED = 30;
  EVENT_TYPE_PLAYER_GOAL = 31;
  EVENT_TYPE_PLAYER_SAVE = 40;
  EVENT_TYPE_PLAYER_STUN = 41;
  EVENT_TYPE_PLAYER_PASS = 42;
  EVENT_TYPE_PLAYER_STEAL = 43;
  EVENT_TYPE_PLAYER_BLOCK = 44;
  EVENT_TYPE_PLAYER_INTERCEPTION = 45;
  EVENT_TYPE_PLAYER_ASSIST = 46;
  EVENT_TYPE_PLAYER_SHOT_TAKEN = 47;
  EVENT_TYPE_GENERIC = 50;
}

message Envelope {
  oneof message {
    CaptureHeader header = 1;
    Frame frame = 2;
    CaptureFooter footer = 3;
  }
}

message CaptureHeader {
  string capture_id = 1;
  google.protobuf.Timestamp created_at = 2;
  uint32 format_version = 3;
  map<string, string> metadata = 4;

  oneof game_header {
    EchoArenaHeader echo_arena = 10;
  }
}

message Frame {
  uint32 frame_index = 1;
  uint32 timestamp_offset_ms = 2;

  oneof payload {
    EchoArenaFrame echo_arena = 10;
  }
}

message CaptureFooter {
  uint32 frame_count = 1;
  uint32 duration_ms = 2;
  uint64 footer_offset = 3;
  repeated KeyframeEntry keyframe_index = 4;
  repeated EventIndexEntry event_index = 5;
}

message KeyframeEntry {
  uint32 frame_index = 1;
  uint64 byte_offset = 2;
}

message EventIndexEntry {
  EventType event_type = 1;
  repeated uint32 frame_indices = 2;
}
